# ============================================================
# Handicap Removal Patterns — 9 points each
# ============================================================
# Each pattern specifies which pieces to remove and from which
# squares (for the white side; black squares are mirrored).
#
# Square naming follows python-chess convention:
#   a1=0, b1=1, ..., h1=7, a2=8, ..., h8=63
#   For white: rank 1 (pieces) and rank 2 (pawns)
#   For black: rank 8 (pieces) and rank 7 (pawns) — auto-mirrored
#
# Concentration levels:
#   1 piece removed  = highest concentration
#   3 pieces removed = high
#   5 pieces removed = medium
#   7 pieces removed = low (maximum dispersion)
# ============================================================

patterns:

  # --- Highest concentration (1 piece) ---
  queen:
    description: "Remove queen (9 pts)"
    total_points: 9
    num_removed: 1
    concentration: "highest"
    phase: 1
    removals:
      - piece: Q
        square: d1   # white queen

  # --- High concentration (3 pieces) ---
  rook_bishop_pawn:
    description: "Remove rook + bishop + pawn (5+3+1 = 9 pts)"
    total_points: 9
    num_removed: 3
    concentration: "high"
    phase: 1
    removals:
      - piece: R
        square: a1   # queenside rook
      - piece: B
        square: c1   # dark-square bishop
      - piece: P
        square: a2   # a-pawn (edge, minimal structure disruption)

  rook_knight_pawn:
    description: "Remove rook + knight + pawn (5+3+1 = 9 pts)"
    total_points: 9
    num_removed: 3
    concentration: "high"
    phase: 1
    removals:
      - piece: R
        square: a1   # queenside rook
      - piece: N
        square: b1   # queenside knight
      - piece: P
        square: a2   # a-pawn

  bishop_bishop_knight:
    description: "Remove 2 bishops + knight (3+3+3 = 9 pts)"
    total_points: 9
    num_removed: 3
    concentration: "high"
    phase: 1
    removals:
      - piece: B
        square: c1   # dark-square bishop
      - piece: B
        square: f1   # light-square bishop
      - piece: N
        square: b1   # queenside knight

  # --- Medium concentration (5 pieces) ---
  rook_4pawns:
    description: "Remove rook + 4 pawns (5+4 = 9 pts)"
    total_points: 9
    num_removed: 5
    concentration: "medium"
    phase: 2
    removals:
      - piece: R
        square: a1
      - piece: P
        square: a2
      - piece: P
        square: b2
      - piece: P
        square: c2
      - piece: P
        square: d2

  bishop_knight_3pawns:
    description: "Remove bishop + knight + 3 pawns (3+3+3 = 9 pts)"
    total_points: 9
    num_removed: 5
    concentration: "medium"
    phase: 2
    removals:
      - piece: B
        square: c1
      - piece: N
        square: b1
      - piece: P
        square: a2
      - piece: P
        square: b2
      - piece: P
        square: c2

  # --- Low concentration / maximum dispersion (7 pieces) ---
  bishop_6pawns:
    description: "Remove bishop + 6 pawns (3+6 = 9 pts)"
    total_points: 9
    num_removed: 7
    concentration: "low"
    phase: 2
    removals:
      - piece: B
        square: c1
      - piece: P
        square: a2
      - piece: P
        square: b2
      - piece: P
        square: c2
      - piece: P
        square: d2
      - piece: P
        square: e2
      - piece: P
        square: f2

  knight_6pawns:
    description: "Remove knight + 6 pawns (3+6 = 9 pts)"
    total_points: 9
    num_removed: 7
    concentration: "low"
    phase: 2
    removals:
      - piece: N
        square: b1
      - piece: P
        square: a2
      - piece: P
        square: b2
      - piece: P
        square: c2
      - piece: P
        square: d2
      - piece: P
        square: e2
      - piece: P
        square: f2
